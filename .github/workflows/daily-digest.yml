name: Daily Task Digest

on:
  schedule:
    - cron: '0 8 * * 1-5'  # 8am UTC Mon-Fri (adjust if needed)
  workflow_dispatch:  # allows manual trigger for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily digest function
        run: |
          curl -X POST \
            'https://hxieotksazwigxfiwjrb.supabase.co/functions/v1/daily-digest' \
            -H 'Content-Type: application/json' \
            -d '{}'
